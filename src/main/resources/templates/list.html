<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>리뷰 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">📋 리뷰 게시판</h2>
<table class="table table-hover">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>제목</th>
        <th>작성자</th>
        <th>조회수</th>
        <th>작성일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="board : ${boards}">
        <td th:text="${board.id}">1</td>
        <td><a th:href="@{/board/{id}(id=${board.id})}" th:text="${board.title}">제목</a></td>
        <td th:text="${board.member.nickname}">작성자</td>
        <td th:text="${board.views}">0</td>
        <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd')}">2026-04-22</td>
    </tr>
    </tbody>
</table>
<div class="d-flex justify-content-end">
    <a href="/board/write" class="btn btn-primary">글쓰기</a>
</div>
</body>
</html>
