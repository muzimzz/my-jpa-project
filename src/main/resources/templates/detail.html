<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>글 상세보기</title>
</head>
<body>
<div class="container">
    <h2 th:text="${board.title}">제목</h2>
    <hr>
    <div>
        작성자: <span th:text="${board.nickname}"></span> |
        날짜: <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
        조회수: <span th:text="${board.views}"></span>
        좋아요: <span id="like-count" th:text="${board.likes}"></span>
    </div>
    <hr>
    <div style="min-height: 200px;">
        <p th:text="${board.content}">내용이 여기에 표시됩니다.</p>
    </div>
    <hr>
    <div class="comment-section" style="margin-top: 30px;">
        <h3>댓글 목록 (<span th:text="${#lists.size(board.comments)}">0</span>)</h3>
        <hr>

        <div th:each="comment : ${board.comments}" style="border-bottom: 1px solid #eee; padding: 10px 0;">
            <div style="font-weight: bold;">
                <span th:text="${comment.nickname}">작성자</span>
                <small style="color: #888; font-weight: normal; margin-left: 10px;"
                       th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">
                    2026-04-23 22:30
                </small>
            </div>
            <div style="margin-top: 5px;" th:text="${comment.content}">
                댓글 내용이 여기에 들어갑니다.
            </div>
        </div>

        <div th:if="${#lists.isEmpty(board.comments)}" style="color: #888; padding: 20px 0;">
            아직 등록된 댓글이 없습니다.
        </div>
    </div>
    <div style="margin-top: 30px; padding: 25px; background-color: #fcfcfc; border: 1px solid #eee; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        <h4 style="margin-bottom: 15px; color: #333;">💬 댓글 남기기</h4>

        <form th:action="@{/board/comment/{id}(id=${board.id})}" method="post">
            <div style="margin-bottom: 15px;">
                <input type="text" name="nickname" placeholder="닉네임" required
                       style="width: 200px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
            </div>

            <div style="margin-bottom: 15px;">
            <textarea name="content" rows="4" placeholder="댓글을 남겨주세요." required
                      style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; line-height: 1.5; resize: none;"></textarea>
            </div>

            <div style="text-align: right;">
                <button type="submit" class="btn"
                        style="background-color: #4CAF50; color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.3s;">
                    댓글 등록하기
                </button>
            </div>
        </form>
    </div>
    <div class="btn-group">
        <a th:href="@{/board/list}" class="btn">목록</a>
        <a th:href="@{/board/edit/{id}(id=${board.id})}" class="btn">수정</a>
        <form th:action="@{/board/delete/{id}(id=${board.id})}" method="post">
            <button type="submit" class="btn" style="background-color: red; color: white;">삭제></button>
        </form>
        <button type="button" th:onclick="|pushLike(${board.id})|">좋아요</button>
        <script>
            function pushLike(boardId) {
                fetch(`/board/like/${boardId}`, {
                    method: 'POST'
                })
                    .then(response => {
                        if (!response.ok) throw new Error("네트워크 응답 에러");
                        return response.json(); // 서버에서 리턴한 int(좋아요 수)를 받음
                    })
                    .then(likeCount => {
                        // 서버에서 받은 최신 숫자로 화면을 업데이트합니다.
                        document.getElementById('like-count').innerText = likeCount;
                        console.log("좋아요 반영 완료:", likeCount);
                    })
                    .catch(error => console.error("에러 발생:", error));
            }
        </script>
    </div>
</div>
</body>
</html>
